<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AnglerDroid v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#1a1a1a;border-bottom:1px solid #333}
header h1{font-size:1.1rem;font-weight:600}
#status{font-size:.75rem;color:#888}
.main{display:flex;flex:1;overflow:hidden}
.left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;gap:12px}
.right{width:340px;display:flex;flex-direction:column;padding:12px;gap:10px;border-left:1px solid #333;overflow-y:auto}
#eyes{width:280px;height:140px;background:#000;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:40px;cursor:pointer;position:relative}
.eye{width:60px;height:72px;background:#fff;border-radius:50%;position:relative;overflow:hidden}
.pupil{width:24px;height:28px;background:#111;border-radius:50%;position:absolute;top:22px;left:18px;transition:all .15s}
.eye.blink{animation:blink .2s}
@keyframes blink{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.05)}}
#eyes:fullscreen{width:100vw;height:100vh;border-radius:0;gap:8vmin}
#eyes:fullscreen .eye{width:20vmin;height:24vmin}
#eyes:fullscreen .pupil{width:8vmin;height:9.5vmin;top:37%;left:30%;transition:all .2s}
#atlas{max-width:100%;border-radius:8px;background:#222}
label{font-size:.8rem;color:#aaa}
input[type=range]{width:100%}
.val{font-size:.8rem;color:#6cf;float:right}
button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600}
.btn-primary{background:#2a6;color:#fff}
.btn-danger{background:#c44;color:#fff}
.btn-secondary{background:#444;color:#eee}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.tab-bar{display:flex;gap:2px;margin-bottom:4px}
.tab-btn{flex:1;padding:6px 0;border:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:.8rem;font-weight:600;background:#222;color:#888}
.tab-btn.active{background:#1a1a1a;color:#eee}
.tab-panel{flex:1;overflow-y:auto;background:#1a1a1a;border-radius:0 0 8px 8px;padding:8px;font-size:.8rem;min-height:120px;display:none}
.tab-panel.active{display:block}
.chat-msg{margin:4px 0;padding:4px 8px;border-radius:4px}
.chat-user{background:#234;color:#8cf}
.chat-ai{background:#232;color:#8f8}
.chat-sys{background:#332;color:#cc8;font-style:italic}
.log-line{margin:2px 0;color:#777;font-family:monospace;font-size:.7rem}
@media(max-width:700px){.main{flex-direction:column}.right{width:100%;border-left:none;border-top:1px solid #333}}
</style>
</head>
<body>
<header>
  <h1>AnglerDroid v2</h1>
  <div id="auth-area"></div>
  <div id="status">connecting...</div>
</header>
<div class="main">
  <div class="left">
    <div id="eyes" onclick="toggleFullscreen()">
      <div class="eye" id="eyeL"><div class="pupil" id="pupilL"></div></div>
      <div class="eye" id="eyeR"><div class="pupil" id="pupilR"></div></div>
    </div>
    <img id="atlas" alt="robot vision">
  </div>
  <div class="right">
    <div id="controls" style="display:none">
      <label>Forward m/s <span class="val" id="fwd-val">0.20</span></label>
      <input type="range" id="fwd" min="-0.5" max="0.5" step="0.05" value="0.2" oninput="document.getElementById('fwd-val').textContent=this.value">
      <label>Angular rad/s <span class="val" id="ang-val">0.00</span></label>
      <input type="range" id="ang" min="-1.0" max="1.0" step="0.1" value="0" oninput="document.getElementById('ang-val').textContent=this.value">
      <label>Duration s <span class="val" id="dur-val">2.0</span></label>
      <input type="range" id="dur" min="0.5" max="10" step="0.5" value="2" oninput="document.getElementById('dur-val').textContent=this.value">
      <div class="btn-row" style="margin-top:8px">
        <button class="btn-primary" onclick="sendTwist()">Send twist_for</button>
        <button class="btn-danger" onclick="sendStop()">STOP</button>
      </div>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn-secondary" id="mic-btn" onclick="toggleMic()">🎤 Mic Off</button>
        <button class="btn-secondary" id="ai-btn" onclick="toggleAI()">🤖 Launch AI</button>
      </div>
      <div id="mic-level-bar" style="height:6px;background:#333;border-radius:3px;margin-top:4px;display:none">
        <div id="mic-level" style="height:100%;background:#2a6;border-radius:3px;width:0%;transition:width .05s"></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <input type="text" id="chat-input" placeholder="Type a message..." style="flex:1;padding:8px;border-radius:6px;border:1px solid #444;background:#222;color:#eee;font-size:.85rem" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn-primary" onclick="sendChat()">Send</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('chat')">Chat</button>
      <button class="tab-btn" onclick="switchTab('log')">Log</button>
    </div>
    <div id="chat" class="tab-panel active"></div>
    <div id="log" class="tab-panel"></div>
  </div>
</div>

<script>
const WS_PORT = '__WS_PORT__';
const GOOGLE_CLIENT_ID = '__GOOGLE_CLIENT_ID__';
let ws = null, role = 'observer', aiActive = false, micOn = false;
let mediaStream = null, mediaRecorder = null, audioCtx = null, analyser = null;
let audioChunks = [], hadVoice = false;
const VOICE_THRESHOLD = 0.015, CHUNK_MS = 4000;

function connect() {
  const host = location.hostname || 'localhost';
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + host + ':' + WS_PORT);
  ws.onopen = () => { document.getElementById('status').textContent = 'connected'; };
  ws.onclose = () => {
    document.getElementById('status').textContent = 'disconnected';
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.type === 'auth_result') {
      role = d.role;
      document.getElementById('status').textContent = role + (d.email ? ' (' + d.email + ')' : '');
      document.getElementById('controls').style.display = role === 'control' ? 'block' : 'none';
      if (d.need_auth && role === 'observer') initGoogleSignIn();
    }
    else if (d.type === 'chat') addChat(d.sender, d.text);
    else if (d.type === 'atlas') document.getElementById('atlas').src = 'data:image/jpeg;base64,' + d.image;
    else if (d.type === 'ai_status') {
      aiActive = d.active;
      document.getElementById('ai-btn').textContent = aiActive ? '⏹ Stop AI' : '🤖 Launch AI';
      if (d.error) addChat('sys', d.error);
      if (d.info) addChat('sys', d.info);
    }
  };
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  document.querySelector('.tab-btn[onclick*="' + name + '"]').classList.add('active');
}

function addChat(sender, text) {
  const el = document.getElementById('chat');
  const cls = sender === 'user' ? 'chat-user' : sender === 'ai' ? 'chat-ai' : 'chat-sys';
  el.innerHTML += '<div class="chat-msg ' + cls + '"><b>' + sender + ':</b> ' + text + '</div>';
  el.scrollTop = el.scrollHeight;
  if (sender === 'ai') speak(text);
}

function addLog(text) {
  const el = document.getElementById('log');
  el.innerHTML += '<div class="log-line">' + new Date().toLocaleTimeString() + ' ' + text + '</div>';
  if (el.children.length > 200) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

function speak(text) {
  if (!text || text.startsWith('[')) return;
  try { speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(text)); } catch(e) {}
}

function sendTwist() {
  if (role !== 'control' || !ws) return;
  ws.send(JSON.stringify({
    type: 'twist_for',
    forward_mps: parseFloat(document.getElementById('fwd').value),
    angular_rads: parseFloat(document.getElementById('ang').value),
    duration_secs: parseFloat(document.getElementById('dur').value),
    ramp_in_secs: 1.0, ramp_out_secs: 1.0,
  }));
}

function sendStop() {
  if (ws) ws.send(JSON.stringify({type: 'stop'}));
}

function sendChat() {
  const el = document.getElementById('chat-input');
  const text = el.value.trim();
  if (!text || role !== 'control' || !ws) return;
  ws.send(JSON.stringify({type: 'speech', text: text}));
  el.value = '';
}

function toggleAI() {
  if (ws) ws.send(JSON.stringify({type: aiActive ? 'stop_ai' : 'launch_ai'}));
}

function toggleMic() {
  micOn = !micOn;
  document.getElementById('mic-btn').textContent = micOn ? '🎤 Mic On' : '🎤 Mic Off';
  document.getElementById('mic-level-bar').style.display = micOn ? 'block' : 'none';
  if (micOn) startAudio(); else stopAudio();
}

async function startAudio() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    addChat('sys', 'Mic unavailable: page must be served over HTTPS or localhost. Current: ' + location.protocol + '//' + location.host);
    micOn = false;
    document.getElementById('mic-btn').textContent = '🎤 Mic Off';
    document.getElementById('mic-level-bar').style.display = 'none';
    return;
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    updateMicLevel();

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                   : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    mediaRecorder = new MediaRecorder(mediaStream, mimeType ? {mimeType} : {});
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (audioChunks.length > 0 && hadVoice) {
        const blob = new Blob(audioChunks, {type: mediaRecorder.mimeType});
        sendAudioBlob(blob);
      } else if (audioChunks.length > 0) {
        addLog('mic: chunk discarded (silence)');
      }
      audioChunks = []; hadVoice = false;
      if (micOn && mediaRecorder) {
        mediaRecorder.start();
        setTimeout(() => { if (micOn && mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, CHUNK_MS);
      }
    };
    mediaRecorder.start();
    setTimeout(() => { if (micOn && mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, CHUNK_MS);
    addLog('mic: capture started (' + (mimeType || 'default') + ')');
  } catch(e) {
    addLog('mic: failed: ' + e.message);
    addChat('sys', 'Mic error: ' + e.message);
    micOn = false;
    document.getElementById('mic-btn').textContent = '🎤 Mic Off';
    document.getElementById('mic-level-bar').style.display = 'none';
  }
}

function stopAudio() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.onstop = null; mediaRecorder.stop(); }
  mediaRecorder = null;
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  mediaStream = null;
  if (audioCtx) audioCtx.close();
  audioCtx = null; analyser = null;
  addLog('mic: stopped');
}

function updateMicLevel() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) { const v = (data[i] - 128) / 128; sum += v * v; }
  const rms = Math.sqrt(sum / data.length);
  const el = document.getElementById('mic-level');
  if (el) {
    const pct = Math.min(100, rms * 400);
    el.style.width = pct + '%';
    el.style.background = rms > VOICE_THRESHOLD ? '#2a6' : '#555';
  }
  if (rms > VOICE_THRESHOLD) hadVoice = true;
  requestAnimationFrame(updateMicLevel);
}

function sendAudioBlob(blob) {
  const reader = new FileReader();
  reader.onloadend = () => {
    const b64 = reader.result.split(',')[1];
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({type: 'audio', data: b64, mime: blob.type}));
      addLog('mic: sent ' + (blob.size / 1024).toFixed(1) + ' KB audio');
      addChat('sys', '🎤 audio sent (' + (blob.size / 1024).toFixed(1) + ' KB)');
    }
  };
  reader.readAsDataURL(blob);
}

function toggleFullscreen() {
  const el = document.getElementById('eyes');
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    el.requestFullscreen().catch(function() {});
  }
}

// Eyes blink every 3-6s
setInterval(() => {
  document.getElementById('eyeL').classList.add('blink');
  document.getElementById('eyeR').classList.add('blink');
  setTimeout(() => {
    document.getElementById('eyeL').classList.remove('blink');
    document.getElementById('eyeR').classList.remove('blink');
  }, 200);
}, 3000 + Math.random() * 3000);

// Subtle pupil movement
setInterval(() => {
  const dx = (Math.random() - 0.5) * 12, dy = (Math.random() - 0.5) * 8;
  document.getElementById('pupilL').style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
  document.getElementById('pupilR').style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
}, 2000);

// Google Sign-In (only if client ID is configured)
function initGoogleSignIn() {
  if (!GOOGLE_CLIENT_ID) return;
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = () => {
    google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onGoogleAuth });
    google.accounts.id.renderButton(document.getElementById('auth-area'), {theme:'outline',size:'small'});
  };
  document.head.appendChild(s);
}
function onGoogleAuth(resp) {
  if (ws) ws.send(JSON.stringify({type: 'auth', credential: resp.credential}));
}

connect();
</script>
</body>
</html>
